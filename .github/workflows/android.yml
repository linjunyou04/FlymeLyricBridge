name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}

      - name: Grant execute permission
        run: chmod +x gradlew || true

      - name: Build debug APKs
        run: ./gradlew :app:assembleDebug :modules:lsposed-hook:app:assembleDebug --no-daemon

      - name: Upload main app APK
        uses: actions/upload-artifact@v4
        with:
          name: lyricbridge-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload lsposed module APK
        uses: actions/upload-artifact@v4
        with:
          name: lsposed-module-apk
          path: modules/lsposed-hook/app/build/outputs/apk/debug/app-debug.apk
